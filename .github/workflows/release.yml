name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          bin=airouter
          if [ "$GOOS" = "windows" ]; then bin=airouter.exe; fi
          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o "dist/$bin" ./cmd/airouter

      - name: Package
        run: |
          name="airouter-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp README.md LICENSE dist/
          (cd dist && zip -r "../${name}.zip" .)

      - uses: actions/upload-artifact@v4
        with:
          name: airouter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: airouter-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
